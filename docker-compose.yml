version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # 1. Backend Service (Flask / Waitress WSGI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: readoo-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PYTHON_HOST=0.0.0.0
      - PYTHON_PORT=5000
      - DATABASE_PATH=data/readoo.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-TrGBorFNd00aBjsMIfu6IK31Kyfi8blz9Q_HHaHivu8=}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - DEMO_USERNAME=${DEMO_USERNAME:-user}
      - DEMO_PASSWORD=${DEMO_PASSWORD:-user}
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - WHISPER_MODEL=base
    volumes:
      # Data persistence: SQLite database, uploaded assets & FAISS indices
      - ./backend/data:/app/data
    networks:
      - readoo-net
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # 2. Frontend Service (React SPA / Nginx Web Server)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: readoo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "3000:80"
    volumes:
      # Share uploaded static files directory with Nginx
      - ./backend/data/uploads:/app/data/uploads:ro
    networks:
      - readoo-net
    depends_on:
      backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # 3. Redis In-Memory Cache Service
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: readoo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - readoo-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

# -----------------------------------------------------------------------------
# Networks & Persistent Volumes
# -----------------------------------------------------------------------------
networks:
  readoo-net:
    driver: bridge

volumes:
  redis-data:
    driver: local